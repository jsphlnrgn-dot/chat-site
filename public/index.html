<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat Site</title>
<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: Arial, sans-serif;
background: #f5f5f5;
color: #111;
}

.wrap {
max-width: 900px;
margin: 0 auto;
padding: 24px 16px 40px;
}

.card {
background: #fff;
border: 1px solid #ddd;
border-radius: 14px;
padding: 16px;
}

h1 {
margin-top: 0;
margin-bottom: 16px;
}

.controls {
display: grid;
gap: 12px;
margin-bottom: 16px;
}

textarea {
width: 100%;
min-height: 110px;
resize: vertical;
padding: 12px;
border-radius: 10px;
border: 1px solid #bbb;
font: inherit;
}

input[type="file"] {
font: inherit;
}

button {
width: fit-content;
padding: 10px 16px;
border: 0;
border-radius: 10px;
cursor: pointer;
font: inherit;
background: #111;
color: #fff;
}

button:disabled {
opacity: 0.6;
cursor: not-allowed;
}

#status {
margin: 12px 0 0;
font-weight: 700;
}

#fileList {
margin: 0;
padding-left: 18px;
color: #444;
}

#chat {
margin-top: 18px;
display: grid;
gap: 12px;
}

.msg {
padding: 12px 14px;
border-radius: 12px;
white-space: pre-wrap;
line-height: 1.45;
}

.user {
background: #e9f2ff;
border: 1px solid #c9dcff;
}

.assistant {
background: #f1f1f1;
border: 1px solid #ddd;
}

.error {
background: #fff0f0;
border: 1px solid #f0b4b4;
color: #8a1f1f;
}

.label {
font-size: 12px;
font-weight: 700;
margin-bottom: 6px;
text-transform: uppercase;
color: #555;
}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1>ChatGPT Clone</h1>

<div class="controls">
<input id="fileInput" type="file" multiple />
<ul id="fileList"></ul>

<textarea id="message" placeholder="Type your message here..."></textarea>

<button id="sendBtn" type="button">Send</button>
</div>

<div id="status">Ready</div>
<div id="chat"></div>
</div>
</div>

<script src="/app.js"></script>
</body>
</html>
